server:
  port: 7000
  use-forward-headers: true
spring:
  application:
    name: gateway-service
security:
  oauth2:
    client:
      clientId: ${OAUTH_CLIENT_ID}
      clientSecret: ${OAUTH_CLIENT_SECRET}
      accessTokenUri: https://gitlab.lrz.de/oauth/token
      userAuthorizationUri: https://gitlab.lrz.de/oauth/authorize
      scope:
        - read_user
        - api
      redirectUri: ${OAUTH_REDIRECT_URI}
    resource:
      userInfoUri: https://gitlab.lrz.de/api/v4/user
zuul:
  # Disable accessing services using service name (i.e. gallery-service).
  # They should be only accessed through the path defined below.
  # Link: https://stackoverflow.com/questions/46317388/zuul-service-name-exposed-instead-of-route-path-only
  ignored-services: "*"
  routes:
    project-service:
      path: "/project/**"
      url: http://project-service:8000
      strip-prefix: false
      sensitiveHeaders: Cookie,Set-Cookie # important, as we are passing `Authorization` header via OAuth2 token relay
    project-file-service:
      path: "/file/**"
      url: http://project-service:8000
      strip-prefix: false
      sensitiveHeaders: Cookie,Set-Cookie # important, as we are passing `Authorization` header via OAuth2 token relay
    compiler-service:
      path: "/compile/**"
      url: http://compiler-service:6000
      strip-prefix: false
    ui-service:
      path: "/ui/**"
      url: http://ui-service:4000
      strip-prefix: false
    dark-mode-service:
      path: "/dark-mode/**"
      url: http://dark-mode-service:5000
      strip-prefix: false
zuul.host.socket-timeout-millis: 20000
zuul.host.connect-timeout-millis: 20000
ribbon.ConnectTimeout: 10000
ribbon.ReadTimeout: 10000
proxy:
  auth:
    routes:
      project-service: oauth2
      project-file-service: oauth2
