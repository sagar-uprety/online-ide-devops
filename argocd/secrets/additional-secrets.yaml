# Additional external secrets for optional/future services
# These can be applied after the core infrastructure is deployed

# Application secrets for Online IDE
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: online-ide-secrets
  namespace: external-secrets
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true" 
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "online-ide"
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: oide-secrets
    creationPolicy: Owner
  data:
  - secretKey: CLIENT_ID
    remoteRef:
      key: "OIDE_CLIENT_ID"
  - secretKey: CLIENT_SECRET
    remoteRef:
      key: "OIDE_CLIENT_SECRET"
  - secretKey: JDBC_URL
    remoteRef:
      key: "OIDE_JDBC_URL"
  - secretKey: POSTGRES_DB
    remoteRef:
      key: "OIDE_POSTGRES_DB"
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: "OIDE_POSTGRES_PASSWORD"
  - secretKey: POSTGRES_USER
    remoteRef:
      key: "OIDE_POSTGRES_USER"

---
