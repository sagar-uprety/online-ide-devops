apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-ide-microservices
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://gitlab.lrz.de/container-security-wizards/online-ide.git
    targetRevision: main
    path: argocd/app-services
    directory:
      exclude: "kustomization.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: online-ide
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
        pod-security.kubernetes.io/warn: restricted
        istio.io/dataplane-mode: ambient
        istio.io/use-waypoint: online-ide-waypoint
