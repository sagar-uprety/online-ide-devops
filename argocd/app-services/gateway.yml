apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: online-ide
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 2000
        supplementalGroups: [2000]
      serviceAccountName: gateway-sa
      containers:
        - name: gateway
          image: gitlab.lrz.de:5005/container-security-wizards/online-ide/gateway:0eac8983
          ports:
            - containerPort: 7000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: OAUTH_REDIRECT_URI
              value: "http://192.168.58.2:30001/login/oauth2/code/gitlab" # Minikube IP
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oide-secrets
                  key: CLIENT_ID
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oide-secrets
                  key: CLIENT_SECRET
      imagePullSecrets:
        - name: gitlab-read
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: online-ide
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 7000
      nodePort: 30001
